services:
  inference:
    build: .
    ports:
      - "8000:8000"
    environment:
      - INFERENCE_SERVICE_SECRET=${INFERENCE_SERVICE_SECRET}
      - DEFAULT_MODEL=sdxl
      - HF_HOME=/models
    volumes:
      - ./models_cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
