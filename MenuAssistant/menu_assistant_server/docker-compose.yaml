services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: menu_assistant
      POSTGRES_PASSWORD: "HMsXFY9JIeReKTA3fmMCnUvraG9wFKLJ"
    volumes:
      - menu_assistant_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "0UN2r9j3jwCwDqx1lt8wY4H0UN-1CgFs"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: menu_assistant_test
      POSTGRES_PASSWORD: "VBmbdJEakqsCarwO5GAsYmSYyFUZGEbL"
    volumes:
      - menu_assistant_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "3RK2lKEsdLvIQj1ez2kauH3d7bzpw1ll"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  menu_assistant_data:
  menu_assistant_test_data:
