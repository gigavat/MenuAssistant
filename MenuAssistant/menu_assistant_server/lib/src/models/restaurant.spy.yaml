class: Restaurant
table: restaurant
fields:
  name: String
  # Lowercased, unicode-NFD stripped of diacritics, punctuation removed.
  # Used for pg_trgm fuzzy match + restaurant_name_trgm_idx (GIN) added in up.sql.
  normalizedName: String
  latitude: double?
  longitude: double?
  # City-level hint derived from client IP when precise geo is absent.
  cityHint: String?
  # ISO 3166-1 alpha-2.
  countryCode: String?
  addressRaw: String?
  currency: String
  createdAt: DateTime
  # Moderation state machine (Sprint 4.9). Nullable = legacy row, трактуется
  # клиентом как 'auto' (видно без ревью). После admin approve/reject статус
  # меняется явно. Значения: 'auto' | 'under_review' | 'approved' | 'rejected'.
  moderationStatus: String?
  # Revision marker для Flutter poll (Sprint 4.9). Bump'ится при каждом
  # mutation через admin validator (updateMenuItem / approveMenu и т.д.).
  # Flutter RestaurantScreen раз в 5 сек читает updatedAt и рефетчит меню
  # если изменилось. Null для legacy — Flutter fallback на createdAt.
  updatedAt: DateTime?
indexes:
  restaurant_geo_idx:
    fields: latitude, longitude
  restaurant_normalized_name_idx:
    fields: normalizedName
  restaurant_moderation_status_idx:
    fields: moderationStatus
